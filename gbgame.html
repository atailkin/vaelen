<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="css/style.css" />
    <title>okthis</title>
    <meta name="author" content="atail" />
    <style type="text/css"> body { background-color:#202850; }</style>
  </head>
  <body>
    <div id="game">
      <canvas id="mainCanvas" width="256" height="224">No Canvas Support</canvas>
    </div>
    <div id="controller">
      <div id="controller_dpad">
        <div id="controller_left"></div>
        <div id="controller_right"></div>
        <div id="controller_up"></div>
        <div id="controller_down"></div>
      </div>
      <div id="controller_select" class="capsuleBtn">Select</div>
      <div id="controller_start" class="capsuleBtn">Start</div>
      <div id="controller_b" class="roundBtn">B</div>
      <div id="controller_a" class="roundBtn">A</div>
    </div>
    <!-- Hidden Audio Element -->
    <audio id="bgMusic" src="music.mp3" loop></audio>
    <script>
      const customControls = {"up":["ArrowUp","w"],"down":["ArrowDown","s"],"left":["ArrowLeft","a"],"right":["ArrowRight","d"],"a":["e"],"b":["q"],"start":["Enter"],"select":["Shift"]}
    </script>
    <script src="binjgb.js"></script>
    <script src="js/script.js"></script>
    <script src="js/debugger.js"></script>
    <script>
      // Start background music when page loads
      const music = document.getElementById('bgMusic');
      music.play().catch(err => console.error("Audio playback failed:", err));
    </script>
    <script>
      let redirected = false;
      let whiteFrameCount = 0;
      setInterval(() => {
        if (redirected) return;
        const canvas = document.querySelector('canvas');
        if (!canvas) return;
        try {
          const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
          if (gl) {
            const pixels = new Uint8Array(4);
            gl.readPixels(0, 0, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, pixels);
            if (pixels[0] === 255 && pixels[1] === 255 && pixels[2] === 255) {
              whiteFrameCount++;
            } else {
              whiteFrameCount = 0;
            }
            if (whiteFrameCount >= 3) {
              redirected = true;
              setTimeout(() => {
                window.location.href = 'game2.html';
              }, 1000);
            }
          }
        } catch(e) {}
      }, 500);
    </script>
    <!-- Redirect to game2.html when the "P" key is pressed -->
    <script>
      document.addEventListener("keydown", function (e) {
        if (e.key && e.key.toLowerCase() === "p" && !e.ctrlKey && !e.altKey && !e.metaKey) {
          window.location.href = "game2.html";
        }
      });
    </script>
  </body>
</html>
