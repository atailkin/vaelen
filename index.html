<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="css/style.css" />
    <title>okthis</title>
    <meta name="author" content="atail" />
    <style type="text/css">
      body { 
        background-color: #202850; 
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
        color: white;
        font-family: sans-serif;
      }
      #game { position: relative; }
    </style>
  </head>
  <body>

    <div id="game">
      <canvas id="mainCanvas" width="256" height="224">No Canvas Support</canvas>
    </div>

    <div id="controller">
      <div id="controller_dpad">
        <div id="controller_left"></div>
        <div id="controller_right"></div>
        <div id="controller_up"></div>
        <div id="controller_down"></div>
      </div>
      <div id="controller_select" class="capsuleBtn">Select</div>
      <div id="controller_start" class="capsuleBtn">Start</div>
      <div id="controller_b" class="roundBtn">B</div>
      <div id="controller_a" class="roundBtn">A</div>
    </div>

    <!-- Hidden Audio Element -->
    <audio id="bgMusic" src="music.mp3" loop></audio>

    <script>
      // 1. Controls configuration
      const customControls = {
        "up": ["ArrowUp", "w"],
        "down": ["ArrowDown", "s"],
        "left": ["ArrowLeft", "a"],
        "right": ["ArrowRight", "d"],
        "a": ["e"],
        "b": ["q"],
        "start": ["Enter"],
        "select": ["Shift"]
      };

      // 2. Audio Logic attached to "Enter" and the Start button
      const music = document.getElementById('bgMusic');
      const startButton = document.getElementById('controller_start');
      let musicStarted = false;

      function playAudio(e) {
        // Trigger if it's a click, or if the key pressed is "Enter"
        if (!musicStarted && (e.type === 'click' || e.key === 'Enter')) {
          music.play().then(() => {
            musicStarted = true; // Prevents it from firing multiple times
            // Clean up event listeners to keep things efficient
            window.removeEventListener('keydown', playAudio);
            startButton.removeEventListener('click', playAudio);
          }).catch(err => console.error("Audio playback failed:", err));
        }
      }

      // Listen for the "Enter" key on the keyboard
      window.addEventListener('keydown', playAudio);
      // Listen for a click/tap on the virtual Start button
      startButton.addEventListener('click', playAudio);
      
      // Keep focus on the window so keyboard controls work immediately
      window.focus();
    </script>

    <!-- 3. Emulator Scripts -->
    <script src="binjgb.js"></script>
    <script src="js/script.js"></script>
    <script src="js/debugger.js"></script>
    
    <!-- Redirect to gbgame.html (start of game sequence) -->
    <script>
      window.location.href = 'gbgame.html';
    </script>
  </body>
</html>
