<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>partFINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --neon-pink: #ff003c;
            --sickly-green: #45a29e;
            --dark-metal: #0b0c10;
            --ash: #c5c6c7;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            font-family: 'Courier Prime', monospace;
            cursor: none;
            user-select: none;
        }

        /* --- THE NOISE & CRT FILTERS --- */
        #noise-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 50;
            opacity: 0.1;
            mix-blend-mode: overlay;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.3));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 51;
        }

        /* --- THE GAME VIEW --- */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: filter 2s ease, transform 0.2s ease;
        }

        #scene {
            position: relative;
            width: 800px;
            height: 600px;
            background: radial-gradient(circle at 50% 30%, #1a1a24 0%, #000 70%);
            box-shadow: inset 0 0 100px #000;
            border: 2px solid #111;
            overflow: hidden;
            transition: all 1s;
        }

        /* --- DISEASE PROGRESSION STAGES --- */
        .stage-0 { filter: grayscale(80%) contrast(1.2); }
        .stage-1 { filter: grayscale(100%) contrast(1.5) blur(1px); animation: pulse-blur 4s infinite; }
        .stage-2 { filter: grayscale(100%) contrast(2) sepia(0.5) hue-rotate(90deg) blur(2px); animation: heavy-shake 0.1s infinite; }
        .stage-3 { filter: grayscale(100%) contrast(2.5) sepia(0.8) hue-rotate(90deg) blur(5px); animation: heavy-shake 0.05s infinite; }

        @keyframes pulse-blur { 0%, 100% { filter: grayscale(100%) contrast(1.5) blur(1px); } 50% { filter: grayscale(100%) contrast(1.5) blur(3px); } }
        @keyframes heavy-shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 50% { transform: translate(-1px, -2px) rotate(-1deg); } 100% { transform: translate(-2px, 1px) rotate(1deg); } }

        /* --- INTERACTIVE OBJECTS --- */
        .hotspot {
            position: absolute;
            cursor: none;
            transition: transform 0.3s, filter 0.3s;
        }
        .hotspot:hover {
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
            transform: scale(1.02);
        }

        #table { top: 250px; left: 100px; width: 600px; height: 300px; z-index: 10; pointer-events: none; }
        
        #cat-corpse { 
            top: 280px; left: 250px; width: 300px; height: 150px; z-index: 20; 
            filter: drop-shadow(0 20px 10px #000);
            object-fit: contain; /* Ensures your image scales correctly */
        }
        
        #notebook { 
            top: 400px; left: 120px; width: 120px; height: 100px; z-index: 20; 
            transform: rotate(-15deg);
            object-fit: contain; /* Ensures your image scales correctly */
        }

        #cygar-can {
            top: 240px; left: 550px; width: 60px; height: 100px; z-index: 20;
            transform: rotate(10deg);
        }

        /* --- DIALOGUE UI --- */
        #dialogue-box {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            min-height: 80px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--sickly-green);
            color: var(--sickly-green);
            padding: 20px;
            font-size: 1.2rem;
            text-shadow: 0 0 5px var(--sickly-green);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        #dialogue-box.active { opacity: 1; }
        
        .red-text { color: #ff3333; text-shadow: 0 0 5px #ff0000; font-style: italic; }

        /* --- CUSTOM CURSOR (THE TREMOR) --- */
        #custom-cursor {
            position: fixed;
            top: 50%; left: 50%;
            width: 20px; height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: width 0.2s, height 0.2s;
        }
        #custom-cursor::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 4px; height: 4px;
            background: red;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* --- OVERLAYS --- */
        #start-screen {
            position: absolute; inset: 0;
            background: #000; color: #fff;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 1000;
            cursor: pointer;
        }
        
        #death-screen {
            position: absolute; inset: 0;
            background: #000; color: #fff;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 2000;
            opacity: 0; pointer-events: none;
            transition: opacity 3s ease-in;
        }
        .neon-ad {
            position: absolute; inset: 0;
            background: var(--neon-pink); color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 4rem; font-weight: bold; text-align: center;
            text-shadow: 0 0 20px #fff;
            z-index: 1500;
            opacity: 0; pointer-events: none;
        }
        .flash { animation: strobe 0.2s 5; }
        @keyframes strobe { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

    </style>
</head>
<body>

    <div id="noise-layer"></div>	
    <div class="scanlines"></div>
    <div id="custom-cursor"></div>

    <div id="start-screen" onclick="initGame()">
        <h1 style="font-size: 3rem; margin-bottom: 10px; color: #45a29e;">Gün 13</h1>
        <p style="font-size: 1.2rem; color: #888;">[ SİMÜLASYONU BAŞLATMAK İÇİN TIKLA ]</p>
        <p style="font-size: 0.9rem; color: #555; margin-top: 20px;">Yatağını hazırla Vaelen.</p>
    </div>

    <div id="game-container">
        <div id="scene" class="stage-0">
            <svg style="position:absolute; top:-100px; left:250px; width:300px; height:500px; opacity:0.1;">
                <polygon points="150,0 300,500 0,500" fill="white" filter="blur(20px)" />
            </svg>

            <svg id="table" class="hotspot" viewBox="0 0 600 300">
                <rect x="50" y="100" width="500" height="40" fill="#222" stroke="#444" stroke-width="2"/>
                <path d="M70 140 L30 300 M530 140 L570 300" stroke="#111" stroke-width="15" fill="none"/>
                <rect x="40" y="90" width="520" height="15" fill="#333" />
            </svg>

            <img id="notebook" class="hotspot" src="book.jpg" alt="Patoloji Not Defteri" onclick="interact('notebook')">

            <svg id="cygar-can" class="hotspot" viewBox="0 0 60 100" onclick="interact('can')">
                <rect x="10" y="10" width="40" height="80" rx="5" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
                <ellipse cx="30" cy="50" rx="15" ry="10" fill="none" stroke="var(--neon-pink)" stroke-width="3" filter="drop-shadow(0 0 5px var(--neon-pink))"/>
                <line x1="15" y1="20" x2="45" y2="20" stroke="#555" stroke-width="2"/>
                <line x1="15" y1="80" x2="45" y2="80" stroke="#555" stroke-width="2"/>
            </svg>

            <img id="cat-corpse" class="hotspot" src="cat.jpg" alt="Kedi" onclick="interact('cat')">

        </div>
    </div>

    <div id="death-screen">
        <div id="death-text" style="text-align: center; max-width: 600px; font-size: 1.5rem; line-height: 2;"></div>
    </div>

    <div id="dialogue-box">
        <span id="dialogue-text"></span>
    </div>

	<script>
        /* --- STATE MANAGEMENT --- */
        let diseaseStage = 0;
        let itemsExamined = { notebook: false, can: false, cat: false };
        let isWriting = false;

        /* --- YOUR MP3 AUDIO FILES --- */
        // CHANGE THESE NAMES TO MATCH YOUR ACTUAL MP3 FILES!
        const droneAudio = new Audio('drone.mp3'); 
        droneAudio.loop = true; // Makes the background noise play forever
        droneAudio.volume = 0.6;

        const heartbeatAudio = new Audio('heartbeat.mp3'); 
        heartbeatAudio.volume = 0.9;

        const jingleAudio = new Audio('jingle.mp3'); 
        jingleAudio.volume = 1.0;

        /* --- TYPEWRITER BEEP (Kept generated so you don't need a 4th file) --- */
        let textAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTextBeep() {
            if(textAudioCtx.state === 'suspended') textAudioCtx.resume();
            let osc = textAudioCtx.createOscillator();
            let gain = textAudioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(800 + Math.random()*200, textAudioCtx.currentTime);
            gain.gain.setValueAtTime(0.02, textAudioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, textAudioCtx.currentTime + 0.05);
            osc.connect(gain); gain.connect(textAudioCtx.destination);
            osc.start(); osc.stop(textAudioCtx.currentTime + 0.05);
        }

        /* --- MECHANICS --- */
        let audioInitialized = false;

        function initGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.body.requestFullscreen().catch(err => console.log("Fullscreen ignored"));
            
            // Start the background drone MP3
            if (!audioInitialized) {
                droneAudio.play().catch(e => console.log("Audio blocked by browser"));
                audioInitialized = true;
            }
            
            // Heartbeat timing loop
            setInterval(() => {
                if(diseaseStage > 0 && diseaseStage < 4) {
                    heartbeatAudio.currentTime = 0; // Reset to start of MP3
                    heartbeatAudio.play().catch(e => {});
                }
            }, 1000 - (diseaseStage * 200));
        }

        const cursor = document.getElementById('custom-cursor');
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let tremorX = 0;
        let tremorY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateCursor() {
            let intensity = diseaseStage * 8; 
            
            if (diseaseStage > 0) {
                tremorX = (Math.random() - 0.5) * intensity;
                tremorY = (Math.random() - 0.5) * intensity;
            }

            cursor.style.left = (mouseX + tremorX) + 'px';
            cursor.style.top = (mouseY + tremorY) + 'px';

            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        let isTyping = false;

        async function typeText(text, elementId, isRed = false) {
            isTyping = true;
            if(isWriting) return;
            isWriting = true;
            const el = document.getElementById(elementId);
            const box = document.getElementById('dialogue-box');
            
            if(elementId === 'dialogue-text') box.classList.add('active');
            
            el.innerHTML = '';
            let formattedText = isRed ? `<span class="red-text">` : '';
            
            for (let i = 0; i < text.length; i++) {
                formattedText += text.charAt(i);
                el.innerHTML = formattedText + (isRed ? `</span>` : '');
                
                // Play tiny click for text
                if(i % 3 === 0) playTextBeep();
                
                await new Promise(r => setTimeout(r, 40));
            }
            
            await new Promise(r => setTimeout(r, 3000)); 
            
            if(elementId === 'dialogue-text') {
                box.classList.remove('active');
            }
            isWriting = false;
            isTyping = false;
        }

        async function interact(item) {
            if (isWriting || isTyping || diseaseStage >= 4) return;

            itemsExamined[item] = true;

            if (item === 'notebook' && diseaseStage === 0) {
                await typeText("Gün 13. Ellerimdeki titreme şiddetlendi. Komşum öldü... Geriye bir tek ben kaldım.", "dialogue-text");
                advanceStage(1);
            } 
            else if (item === 'can' && diseaseStage === 1) {
                await typeText("Mide bulandırıcı, metalden bir kutu.", "dialogue-text");
                advanceStage(2);
            }
            else if (item === 'cat' && diseaseStage === 2) {
                await typeText("Başka seçenek kalmadı... Kediyi deştim. Hücreler aynı. Değişen hiç bir şey yok. İğrenç gerçek bu masada ölü yatıyor.", "dialogue-text", true);
                advanceStage(3);
                
                document.getElementById('scene').onclick = triggerEnding;
                cursor.style.width = "40px";
                cursor.style.height = "40px";
                cursor.style.borderColor = "red";
            }
            else {
                if(item === 'notebook') await typeText("Kelimeler birbirine giriyor. Okuyamıyorum.", "dialogue-text");
                if(item === 'can') await typeText("Boş bir kutu.", "dialogue-text");
                if(item === 'cat') await typeText("Zavallı yaratık. İkimiz de aynı acının parçalarıyız.", "dialogue-text");
            }
        }

        function advanceStage(level) {
            diseaseStage = level;
            document.getElementById('scene').className = `stage-${level}`;
            
            // Speed up the ambient drone to increase tension as disease progresses!
            droneAudio.playbackRate = 1 + (level * 0.15);
        }

		async function triggerEnding() {
            if (diseaseStage !== 3 || isWriting || isTyping) return;
            diseaseStage = 4;
            
            document.getElementById('scene').onclick = null;

            // Play your custom Jingle MP3 (Optional: you can remove this too if you don't want the sound anymore!)
            jingleAudio.currentTime = 0;
            jingleAudio.play();
            
            await new Promise(r => setTimeout(r, 1000));
            
            document.getElementById('death-screen').style.opacity = '1';
            
            // Completely hide the blurry room so the text is crisp
            document.getElementById('scene').style.display = 'none'; 
            
            // Stop the drone when you pass out
            droneAudio.pause();
            
            await new Promise(r => setTimeout(r, 3000));

            await typeText("Hastalık...", "death-text");
            await typeText("Hastalık... Beni bu sınırsız yarıştan kurtardı.", "death-text");
            await typeText("Hastalık... Sonunda bu bencil kişiliğimi içine kapattı.", "death-text");
            await typeText("Hastalık... Baştan beri çaresi olmamıştı..<br><br><span class='red-text'>Vaelen ölü.</span>", "death-text");

            // ask for mic access at the moment of death
            try { await navigator.mediaDevices.getUserMedia({ audio: true }); } catch(e) {}

            await typeText("İnsanoğlu günün birinde tekrar dönemeyecek.<br><br><span class='red-text'>Vaelen ölü.<br><br>İyi uykular, Vaelen...</span>", "death-text");
            
            document.getElementById('custom-cursor').style.display = 'none';

            await new Promise(r => setTimeout(r, 3000));
            window.location.href = 'game3.html';
        }
    </script>
</body>
</html>
